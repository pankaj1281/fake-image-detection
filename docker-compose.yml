services:
  backend:
    build: .
    container_name: fake-image-backend
    ports:
      - "8000:8000"

  frontend:
    image: node:22-alpine
    working_dir: /ui
    volumes:
      - ./frontend:/ui
    command: sh -c "npm install && npm run build"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./deployment/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
